spring:
  application:
    name: stepwise
  servlet:
    multipart:
      max-file-size: 2MB
  config:
    import:
      - file-upload.yml
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/stepwise_db}
    username: ${DB_USERNAME:admin}
    password: ${DB_PASSWORD:admin}
    hikari:
      schema: stepwise_schema
      connection-init-sql: CREATE SCHEMA IF NOT EXISTS stepwise_schema
      connection-timeout: 10000
  jpa:
    generate-ddl: true
    open-in-view: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        default_schema: stepwise_schema
        org.hibernate.envers:
          audit_table_suffix: _aud
          revision_field_name: rev
          revision_type_field_name: rev_type
          store_data_at_delete: true
          global_with_modified_flag: true
          modified_flag_suffix: _mod
          default_schema: stepwise_schema
  mail:
    host: smtp.mail.ru
    port: 2525
    username: ${SMTP_USERNAME:test@mail.ru}
    password: ${SMTP_PASSWORD:test_password}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
jwt:
  secret: ${JWT_SECRET:very-very-secure-secret-key-that-is-at-least-32-characters-long}
  expiration: 3600000

minio:
  url: ${STORAGE_URL:http://localhost:9000}
  access-key: ${STORAGE_AK:minioadmin}
  secret-key: ${STORAGE_SK:minioadmin}
  bucket-names:
    - works

client:
  url: ${CLIENT_URL:http://localhost:5173}
  refresh-token-url: ${client.url}${REFRESH_TOKEN_URL:/reset?token=}

gigaChat:
  authKey: ${GIGACHAT_AUTH_KEY:123authkey}

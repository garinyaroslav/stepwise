services:
  postgres-stepwise:
    image: postgres:18-alpine
    environment:
      - POSTGRES_DB=stepwise_db
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=admin
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./init-db:/docker-entrypoint-initdb.d
    networks:
      - stepwise_network

  minio:
    image: minio/minio
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
      - MINIO_BUCKETS=mybucket
    ports:
      - "9000:9000"
      - "9001:9001"
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - stepwise_network

volumes:
  postgres_data:
  minio_data:

networks:
  stepwise_network:
